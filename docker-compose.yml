services:
  db:
    image: postgres:15-alpine
    container_name: nexuserp-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: nexuserppassword
      POSTGRES_DB: nexuserp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: nexuserp-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexuserp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
